name: Daily Industry News Assistant

on:
  workflow_dispatch:
    inputs:
      force_push:
        description: "Force WeChat push even if today's report was already sent"
        required: false
        default: false
        type: boolean
  schedule:
    # Beijing 20:30 = UTC 12:30. Beijing 20:45 is a backup run.
    - cron: "30 12 * * *"
    - cron: "45 12 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate daily report
        run: node scripts/generate-daily.js
        env:
          TZ: Asia/Shanghai
          SITE_URL: https://ghuahuag.github.io/GHUAHUA/
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}

      - name: Commit generated report data
        run: |
          git config user.name "news-assistant-bot"
          git config user.email "news-assistant-bot@users.noreply.github.com"
          git add public/data
          git diff --cached --quiet || git commit -m "Update daily industry news report"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - uses: actions/deploy-pages@v4

      - name: Refresh push state
        run: git pull --rebase origin main

      - name: Push report to WeChat
        run: node scripts/push-wechat.js
        env:
          SITE_URL: https://ghuahuag.github.io/GHUAHUA/
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_CHANNEL: wechat
          PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
          FORCE_PUSH: ${{ inputs.force_push }}

      - name: Commit WeChat push state
        run: |
          git add public/data/push-state.json
          git diff --cached --quiet || git commit -m "Update WeChat push state"
          git push
